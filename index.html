<!DOCTYPE html>
<html lang="zh-CN">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>员工入职登记</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

*{
    box-sizing:border-box;
}

html,
body{
    margin:0;
    padding:0;
    width:100%;
    min-height:100vh;
    font-family:Arial,sans-serif;
    background:#ffffff;
}

.container{
    width:100%;
    max-width:500px;
    margin:auto;
    padding:20px;
}

h2{
    text-align:center;
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:bold;
}

.warning{
    color:red;
    font-size:12px;
}

input,
textarea{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    margin-bottom:15px;
    font-size:14px;
}

textarea{
    min-height:100px;
    resize:vertical;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#2481cc;
    color:#fff;
    font-size:16px;
    cursor:pointer;
}

.notice{
    margin-top:20px;
    padding:15px;
    background:#f5f5f5;
    border-radius:10px;
    line-height:1.8;
}

.alert{
    margin-bottom:20px;
    padding:12px;
    border-radius:8px;
    background:#fff3cd;
    color:#856404;
    font-size:13px;
}

</style>

</head>

<body>

<div class="container">

<h2>员工入职登记</h2>

<div class="alert">
⚠ 工作期间请勿修改工作小名及 Telegram Username，否则可能影响考勤统计、工资发放及福利领取。
</div>

<label>
工作小名
<span class="warning">（工作中不能修改）</span>
</label>

<input
id="nickname"
placeholder="请输入工作小名">

<label>
Telegram Username
<span class="warning">（工作中不能修改）</span>
</label>

<input
id="username"
placeholder="@Username">

<label>入职日期</label>

<input
id="joinDate"
type="date">

<label>备注</label>

<textarea
id="remark"
placeholder="备注信息"></textarea>

<button onclick="submitForm()">
提交
</button>

<div class="notice">

<b>入职之前麻烦准备好以下内容：</b>

<ul>
<li>工作电脑</li>
<li>稳定网络</li>
<li>VPN 软件</li>
<li>Zoom 软件</li>
<li>Telegram（小飞机）</li>
</ul>

</div>

</div>

<script>

const tg = window.Telegram.WebApp;

tg.ready();
tg.expand();

const user = tg.initDataUnsafe.user || {};

document.getElementById("username").value =
user.username ? "@" + user.username : "";

async function submitForm(){

    const nickname =
    document.getElementById("nickname").value.trim();

    const joinDate =
    document.getElementById("joinDate").value;

    if(!nickname){
        alert("请输入工作小名");
        return;
    }

    if(!joinDate){
        alert("请选择入职日期");
        return;
    }

    const data = {

        telegram_id: user.id || "",

        username: user.username || "",

        nickname: nickname,

        join_date: joinDate,

        remark:
        document.getElementById("remark").value.trim()

    };

    try{

        const response = await fetch(
        "https://script.google.com/macros/s/AKfycbzFzO0kTN1Q2wxDJ3eL7YX9ISOys1t885cl_sgbY1LBVUk5zfKE6AYEQNr9QkiyMzCa/exec",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify(data)
        });

        if(!response.ok){
            throw new Error("Request failed");
        }

        alert("提交成功");
        tg.close();

    }catch(error){

        console.error(error);
        alert("提交失败，请联系HR");

    }

}

</script>

</body>
</html>
